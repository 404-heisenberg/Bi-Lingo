<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Bi-Lingo — Learner Dashboard</title>
    <meta name="description" content="Your Bi-Lingo learning dashboard" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" />
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>
    <!-- ========== APP NAV ========== -->
    <nav class="app-nav">
        <div class="inner">
            <a href="../index.html" class="brand">
                <div class="brand-mark" aria-hidden="true">B</div>
                <span>Bi-Lingo</span>
            </a>
            <div class="page-title" id="welcome-title">Dashboard</div>
            <div class="nav-actions">
                <a href="teacher.html" class="btn btn-ghost btn-sm">Teacher View →</a>
                <button onclick="exitDemo()" class="btn btn-ghost btn-sm" style="color: var(--fg-mute);">Exit Demo</button>
            </div>
        </div>
    </nav>

    <!-- ========== DASHBOARD CONTENT ========== -->
    <section style="padding: 2rem 0;">
        <div class="container">
            <!-- Welcome Section -->
            <div class="page-header">
                <h1 id="welcome-heading">Welcome back!</h1>
                <p class="subtitle" id="context-info">Loading your learning context...</p>
            </div>

            <!-- Quick Stats -->
            <div class="dashboard-stats mb-2">
                <div class="stat-card">
                    <div class="stat-value" id="total-lessons">0</div>
                    <div class="stat-label">Total Lessons</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="completed-lessons">0</div>
                    <div class="stat-label">Completed</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="confidence-score">0%</div>
                    <div class="stat-label">Confidence</div>
                </div>
            </div>

            <!-- Lesson Cards Grid -->
            <div class="mb-2">
                <h2 style="font-size: 1.3rem; margin-bottom: 1rem;">Your Lessons</h2>
                <div class="lesson-grid" id="lesson-grid">
                    <!-- Lesson cards will be populated by JS -->
                </div>
            </div>

            <!-- Quick Access Tutor -->
            <div class="mt-3">
                <h2 style="font-size: 1.3rem; margin-bottom: 0.5rem;">Quick Questions</h2>
                <p style="color: var(--fg-dim); font-size: 14px; margin-bottom: 1rem;">
                    Try asking the tutor one of these common questions:
                </p>
                <div class="quick-questions" id="quick-questions">
                    <!-- Quick question buttons will be populated by JS -->
                </div>
                <div style="margin-top: 1.5rem;">
                    <a href="tutor.html" class="btn btn-primary">
                        Ask Your Own Question →
                    </a>
                </div>
            </div>
        </div>
    </section>

    <script src="../data/mock-data.js"></script>
    <script src="../js/dashboard.js"></script>
    <script>
        function exitDemo() {
            if (confirm('Exit the demo and return to the homepage?')) {
                clearLearnerProfile();
                window.location.href = '../index.html';
            }
        }
    </script>
</body>
</html>
