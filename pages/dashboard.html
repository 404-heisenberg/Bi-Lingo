<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Bi-Lingo — Learner Dashboard</title>
    <meta name="description" content="Your Bi-Lingo learning dashboard" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" />
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
    <script>
        (function(){var t=localStorage.getItem('biLingoTheme');if(t==='light')document.documentElement.setAttribute('data-theme','light');})();
    </script>
</head>
<body>
    <!-- ========== APP NAV ========== -->
    <nav class="app-nav">
        <div class="inner">
            <a href="../index.html" class="brand">
                <div class="brand-mark" aria-hidden="true">B</div>
                <span>Bi-Lingo</span>
            </a>
            <div class="page-title" id="welcome-title">Dashboard</div>
            <div class="nav-actions">
                <a href="teacher.html" class="btn btn-ghost btn-sm">Teacher View</a>
                <button onclick="exitDemo()" class="btn btn-ghost btn-sm" style="color: var(--fg-mute);">Exit Demo</button>
                <button class="theme-btn" id="theme-toggle" aria-label="Switch theme">
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- ========== DASHBOARD CONTENT ========== -->
    <section style="padding: 2rem 0;">
        <div class="container" style="max-width: 900px;">
            <!-- Welcome Section -->
            <div class="page-header">
                <h1 id="welcome-heading">Welcome back!</h1>
                <p class="subtitle" id="context-info">Loading your learning context...</p>
                <span class="badge badge-info" style="margin-top: 0.5rem; display: inline-flex;">Demo mode</span>
            </div>

            <!-- Quick Stats -->
            <div class="dashboard-stats mb-2">
                <div class="stat-card">
                    <div class="stat-value" id="total-lessons">2</div>
                    <div class="stat-label">Total Lessons</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="completed-lessons">0</div>
                    <div class="stat-label">Completed</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="confidence-score">30%</div>
                    <div class="stat-label">Confidence</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="streak-count">0🔥</div>
                    <div class="stat-label">Day Streak</div>
                </div>
            </div>

            <!-- Lesson Cards Grid -->
            <div class="mb-2">
                <h2 style="font-size: 1.3rem; margin-bottom: 1rem;">Your Lessons</h2>
                <div class="lesson-grid" id="lesson-grid">
                    <!-- Lesson cards will be populated by JS -->
                </div>
            </div>
        </div>
    </section>

    <script src="../data/mock-data.js"></script>
    <script src="../js/dashboard.js"></script>
    <script>
        function exitDemo() {
            if (confirm('Exit the demo and return to the homepage?')) {
                clearLearnerProfile();
                window.location.href = '../index.html';
            }
        }
        (function(){var t=document.getElementById('theme-toggle');if(!t)return;t.addEventListener('click',function(){var h=document.documentElement;var l=h.getAttribute('data-theme')==='light';if(l){h.removeAttribute('data-theme');localStorage.setItem('biLingoTheme','dark');}else{h.setAttribute('data-theme','light');localStorage.setItem('biLingoTheme','light');}});})();
    </script>
</body>
</html>
