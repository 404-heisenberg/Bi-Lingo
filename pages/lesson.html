<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Bi-Lingo — Lesson Detail</title>
    <meta name="description" content="Learn concepts with Bi-Lingo in your language" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" />
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../css/lesson.css" />
</head>
<body>
    <!-- =========== APP NAV =========== -->
    <nav class="app-nav">
        <div class="inner">
            <a href="dashboard.html" class="back-btn">
                <span>←</span>
                <span>Back to Dashboard</span>
            </a>
            <div class="page-title" id="lesson-title">Lesson</div>
            <div class="nav-actions">
                <button onclick="exitDemo()" class="btn btn-ghost btn-sm" style="color: var(--fg-mute);">Exit Demo</button>
            </div>
        </div>
    </nav>

    <!-- =========== LESSON CONTENT =========== -->
    <section style="padding: 2rem 0;">
        <div class="container" style="max-width: 900px;">
            <!-- Lesson Header -->
            <div class="lesson-header mb-2">
                <div>
                    <h1 id="lesson-heading">Loading...</h1>
                    <div class="lesson-meta" id="lesson-meta">
                        <!-- Populated by JS -->
                    </div>
                </div>
                <div>
                    <span class="badge badge-info" id="difficulty-badge">Medium</span>
                </div>
            </div>

            <!-- Language Tabs -->
            <div class="tabs" id="language-tabs">
                <button class="tab active" data-lang="english">English</button>
                <button class="tab" data-lang="isizulu">isiZulu</button>
                <button class="tab" data-lang="sesotho">Sesotho</button>
            </div>

            <!-- Lesson Content -->
            <div class="tab-content active" id="content-english">
                <div class="lesson-explanation" id="explanation-english">
                    <!-- Populated by JS -->
                </div>
            </div>
            <div class="tab-content" id="content-isizulu">
                <div class="lesson-explanation" id="explanation-isizulu">
                    <!-- Populated by JS -->
                </div>
            </div>
            <div class="tab-content" id="content-sesotho">
                <div class="lesson-explanation" id="explanation-sesotho">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Key Points -->
            <div class="mt-3 mb-2">
                <h2 style="font-size: 1.2rem; margin-bottom: 1rem;">Key Points</h2>
                <div id="key-points">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Tutor Notes (English lesson) -->
            <div class="mt-3 mb-2" id="tutor-notes-section" style="display: none;">
                <h2 style="font-size: 1.2rem; margin-bottom: 1rem;">Tutor Notes</h2>
                <div id="tutor-notes">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Math Tutor (Math lesson) -->
            <div class="mt-3 mb-2" id="math-tutor-section" style="display: none;">
                <h2 style="font-size: 1.2rem; margin-bottom: 0.75rem;">Try the Tutor</h2>
                <div class="tutor-quick-questions" id="math-quick-questions"></div>
                <div class="tutor-live-toggle" id="live-toggle">
                    <label class="live-toggle">
                        <input type="checkbox" id="live-mode-toggle" />
                        <span>Live mode</span>
                    </label>
                    <span class="badge badge-info" id="live-mode-badge">Demo responses</span>
                </div>
                <div class="tutor-input">
                    <input type="text" id="math-question-input" class="form-input" placeholder="Ask a math question (demo responses)" />
                    <button class="btn btn-primary" id="math-ask-btn">Ask Tutor →</button>
                </div>
                <div class="tutor-response" id="math-response"></div>
            </div>

            <!-- Practice Question -->
            <div class="practice-section mt-3" id="practice-section">
                <h2 style="font-size: 1.2rem; margin-bottom: 0.5rem;">Test Your Understanding</h2>
                <p style="color: var(--fg-dim); font-size: 14px; margin-bottom: 1.5rem;">
                    Try this practice question to check your understanding.
                </p>
                <div class="card" id="practice-card">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Action Buttons -->
            <div style="margin-top: 2.5rem; display: flex; gap: 1rem; flex-wrap: wrap;">
                <a href="dashboard.html" class="btn btn-secondary">
                    ← Back to Dashboard
                </a>
            </div>
        </div>
    </section>

    <script src="../data/mock-data.js"></script>
    <script src="../js/lesson.js"></script>
    <script>
        function exitDemo() {
            if (confirm('Exit the demo and return to the homepage?')) {
                clearLearnerProfile();
                window.location.href = '../index.html';
            }
        }
    </script>
</body>
</html>
