<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Bi-Lingo — Log in</title>
    <meta name="description" content="Log in to your Bi-Lingo account" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" />
    <link rel="stylesheet" href="../styles.css" />
    <script>
        (function(){var t=localStorage.getItem('biLingoTheme');if(t==='light')document.documentElement.setAttribute('data-theme','light');})();
    </script>
    <style>
        .auth-page {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem;
        }
        .auth-card {
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--line-strong);
            border-radius: 24px;
            background: var(--card);
            padding: 2.5rem 2rem;
        }
        .auth-card .brand {
            justify-content: center;
            margin-bottom: 0.5rem;
        }
        .auth-card h1 {
            text-align: center;
            font-size: 1.6rem;
            margin-bottom: 0.3rem;
        }
        .auth-card .subtitle {
            text-align: center;
            color: var(--fg-dim);
            font-size: 14px;
            margin-bottom: 2rem;
        }
        .auth-card .form-group {
            margin-bottom: 1.25rem;
        }
        .auth-card .btn-primary {
            width: 100%;
            justify-content: center;
            padding: 0.85rem;
            font-size: 15px;
        }
        .auth-card .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .auth-card .auth-error {
            color: #ff6b6b;
            font-size: 13px;
            text-align: center;
            margin-top: 0.75rem;
            font-family: var(--f-mono);
        }
        .auth-card .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 14px;
            color: var(--fg-dim);
        }
        .auth-card .auth-footer a {
            color: var(--accent);
            font-weight: 600;
        }
        .auth-card .auth-footer a:hover {
            text-decoration: underline;
        }
        .auth-card .form-input {
            width: 100%;
        }
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--fg-mute);
            font-size: 12px;
            font-family: var(--f-mono);
        }
        .auth-divider::before,
        .auth-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--line);
        }
        .demo-link {
            display: block;
            text-align: center;
            font-size: 13px;
            color: var(--fg-mute);
            padding: 0.6rem;
            border: 1px dashed var(--line);
            border-radius: 10px;
            margin-top: 0.5rem;
            transition: border-color 0.2s, color 0.2s;
        }
        .demo-link:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <a href="../index.html" class="brand">
                <div class="brand-mark" aria-hidden="true">B</div>
                <span>Bi-Lingo</span>
            </a>
            <h1>Welcome back</h1>
            <p class="subtitle">Log in to continue learning</p>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email" />
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Your password" required autocomplete="current-password" />
                </div>

                <button type="submit" class="btn btn-primary" id="login-btn">Log in</button>
                <div id="auth-error" class="auth-error"></div>
            </form>

            <p class="auth-footer">
                Don't have an account? <a href="../pages/register.html">Create one</a>
            </p>

            <div class="auth-divider">or</div>
            <a href="onboarding.html?fresh=true" class="demo-link">Continue as guest (Demo mode)</a>
        </div>
    </div>

    <script type="module" src="../js/supabase-client.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Show a notice if already logged in
            window.SupabaseAuth.getUser().then(function(user) {
                if (user) {
                    var notice = document.createElement('div');
                    notice.style.cssText = 'padding:0.6rem 0.9rem;margin-bottom:1.25rem;border:1px dashed var(--accent);border-radius:10px;background:color-mix(in oklch,var(--accent) 8%,transparent);font-size:13px;text-align:center;';
                    var profile = getLearnerProfile();
                    if (profile && profile.completed) {
                        notice.innerHTML = 'You\'re logged in as <strong>' + user.email + '</strong>. <a href="dashboard.html" style="color:var(--accent);font-weight:600;">Go to Dashboard</a> · <a href="#" id="logout-link" style="color:var(--fg-dim);">Sign Out</a>';
                    } else {
                        notice.innerHTML = 'You\'re logged in as <strong>' + user.email + '</strong>. <a href="onboarding.html" style="color:var(--accent);font-weight:600;">Complete your profile</a> · <a href="#" id="logout-link" style="color:var(--fg-dim);">Sign Out</a>';
                    }
                    document.querySelector('.auth-card .subtitle').after(notice);
                    document.getElementById('logout-link').addEventListener('click', function(e) {
                        e.preventDefault();
                        window.SupabaseAuth.signOut().then(function() {
                            clearLearnerProfile();
                            window.location.reload();
                        });
                    });
                }
            });

            const form = document.getElementById('login-form');
            const btn = document.getElementById('login-btn');
            const errorEl = document.getElementById('auth-error');

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                errorEl.textContent = '';

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                if (!email || !password) {
                    errorEl.textContent = 'Please enter your email and password.';
                    return;
                }

                btn.disabled = true;
                btn.textContent = 'Logging in…';

                try {
                    await window.SupabaseAuth.signIn(email, password);
                    const profile = getLearnerProfile();
                    if (profile && profile.completed) {
                        window.location.href = 'dashboard.html';
                    } else {
                        window.location.href = 'onboarding.html';
                    }
                } catch (err) {
                    console.error('Login error:', err);
                    if (err.message) {
                        if (err.message.includes('Invalid login')) {
                            errorEl.textContent = 'Wrong email or password. Try again.';
                        } else {
                            errorEl.textContent = err.message;
                        }
                    } else {
                        errorEl.textContent = 'Something went wrong. Please try again.';
                    }
                    btn.disabled = false;
                    btn.textContent = 'Log in';
                }
            });
        });
    </script>
    <script src="../data/mock-data.js"></script>
</body>
</html>
