<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Bi-Lingo — Create your account</title>
    <meta name="description" content="Create your free Bi-Lingo account and start learning CAPS subjects with an AI tutor that speaks your home language." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bi-Lingo" />
    <meta property="og:title" content="Bi-Lingo — Create your account" />
    <meta property="og:description" content="Create your free Bi-Lingo account and start learning CAPS subjects with an AI tutor that speaks your home language." />
    <meta property="og:url" content="https://bi-lingo.com/pages/register.html" />
    <meta property="og:image" content="https://bi-lingo.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:image" content="https://bi-lingo.com/og-image.png" />
    <meta name="twitter:title" content="Bi-Lingo — Create your account" />
    <meta name="twitter:description" content="Create your free Bi-Lingo account and start learning CAPS subjects with an AI tutor that speaks your home language." />

    <!-- Robots -->
    <meta name="robots" content="noindex, nofollow" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" />
    <link rel="stylesheet" href="../styles.css" />
    <script>
        (function(){var t=localStorage.getItem('biLingoTheme');if(t==='light')document.documentElement.setAttribute('data-theme','light');})();
    </script>
    <style>
        .auth-page {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem;
        }
        .auth-card {
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--line-strong);
            border-radius: 24px;
            background: var(--card);
            padding: 2.5rem 2rem;
        }
        .auth-card .brand {
            justify-content: center;
            margin-bottom: 0.5rem;
        }
        .auth-card h1 {
            text-align: center;
            font-size: 1.6rem;
            margin-bottom: 0.3rem;
        }
        .auth-card .subtitle {
            text-align: center;
            color: var(--fg-dim);
            font-size: 14px;
            margin-bottom: 2rem;
        }
        .auth-card .form-group {
            margin-bottom: 1.25rem;
        }
        .auth-card .btn-primary {
            width: 100%;
            justify-content: center;
            padding: 0.85rem;
            font-size: 15px;
        }
        .auth-card .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .auth-card .auth-error {
            color: #ff6b6b;
            font-size: 13px;
            text-align: center;
            margin-top: 0.75rem;
            font-family: var(--f-mono);
        }
        .auth-card .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 14px;
            color: var(--fg-dim);
        }
        .auth-card .auth-footer a {
            color: var(--accent);
            font-weight: 600;
        }
        .auth-card .auth-footer a:hover {
            text-decoration: underline;
        }
        .auth-card .form-input {
            width: 100%;
        }
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--fg-mute);
            font-size: 12px;
            font-family: var(--f-mono);
        }
        .auth-divider::before,
        .auth-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--line);
        }
        .demo-link {
            display: block;
            text-align: center;
            font-size: 13px;
            color: var(--fg-mute);
            padding: 0.6rem;
            border: 1px dashed var(--line);
            border-radius: 10px;
            margin-top: 0.5rem;
            transition: border-color 0.2s, color 0.2s;
        }
        .demo-link:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .name-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }
        @media (max-width: 400px) {
            .name-row {
                grid-template-columns: 1fr;
            }
            .auth-card {
                padding: 1.5rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <a href="../index.html" class="brand">
                <div class="brand-mark" aria-hidden="true">B</div>
                <span>Bi-Lingo</span>
            </a>
            <h1>Create your account</h1>
            <p class="subtitle">Free for learners during pilot</p>

            <form id="register-form">
                <div class="name-row">
                    <div class="form-group">
                        <label class="form-label" for="first-name">First name</label>
                        <input type="text" id="first-name" class="form-input" placeholder="Thando" required autocomplete="given-name" />
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="last-name">Last name</label>
                        <input type="text" id="last-name" class="form-input" placeholder="Mokoena" required autocomplete="family-name" />
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email" />
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password" />
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirm-password">Confirm password</label>
                    <input type="password" id="confirm-password" class="form-input" placeholder="Repeat your password" required autocomplete="new-password" />
                </div>

                <button type="submit" class="btn btn-primary" id="register-btn">Create account</button>
                <div id="auth-error" class="auth-error"></div>
            </form>

            <p class="auth-footer">
                Already have an account? <a href="../pages/login.html">Log in</a>
            </p>

            <div class="auth-divider">or</div>
            <a href="onboarding.html?fresh=true" class="demo-link">Continue as guest (Demo mode)</a>
        </div>
    </div>

    <script type="module" src="../js/supabase-client.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('register-form');
            const btn = document.getElementById('register-btn');
            const errorEl = document.getElementById('auth-error');

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                errorEl.textContent = '';

                const firstName = document.getElementById('first-name').value.trim();
                const lastName = document.getElementById('last-name').value.trim();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const confirm = document.getElementById('confirm-password').value;

                if (!firstName || !lastName) {
                    errorEl.textContent = 'Please enter your name.';
                    return;
                }
                if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    errorEl.textContent = 'Please enter a valid email.';
                    return;
                }
                if (password.length < 6) {
                    errorEl.textContent = 'Password must be at least 6 characters.';
                    return;
                }
                if (password !== confirm) {
                    errorEl.textContent = 'Passwords do not match.';
                    return;
                }

                btn.disabled = true;
                btn.textContent = 'Creating account…';

                try {
                    await window.SupabaseAuth.signUp(email, password, {
                        data: { name: firstName + ' ' + lastName }
                    });
                    localStorage.setItem('biLingoPendingName', JSON.stringify({ firstName, lastName }));
                    window.location.href = 'onboarding.html';
                } catch (err) {
                    console.error('Signup error:', err);
                    if (err.message) {
                        if (err.message.includes('already registered')) {
                            errorEl.textContent = 'An account with this email already exists. Try logging in.';
                        } else {
                            errorEl.textContent = err.message;
                        }
                    } else {
                        errorEl.textContent = 'Something went wrong. Please try again.';
                    }
                    btn.disabled = false;
                    btn.textContent = 'Create account';
                }
            });
        });
    </script>
</body>
</html>
