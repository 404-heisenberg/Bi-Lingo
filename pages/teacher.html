<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Bi-Lingo — Teacher Dashboard</title>
    <meta name="description" content="Teacher view of learner progress and insights" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" />
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../css/teacher.css" />
</head>
<body>
    <!-- ========== APP NAV ========== -->
    <nav class="app-nav">
        <div class="inner">
            <a href="../index.html" class="brand">
                <div class="brand-mark" aria-hidden="true">B</div>
                <span>Bi-Lingo</span>
            </a>
            <div class="page-title">Teacher Dashboard</div>
            <div class="nav-actions">
                <a href="dashboard.html" class="btn btn-ghost btn-sm">← Learner View</a>
                <button onclick="exitDemo()" class="btn btn-ghost btn-sm" style="color: var(--fg-mute);">Exit Demo</button>
            </div>
        </div>
    </nav>

    <!-- ========== TEACHER CONTENT ========== -->
    <section style="padding: 2rem 0;">
        <div class="container">
            <!-- Header -->
            <div class="page-header">
                <h1>Class Overview</h1>
                <p class="subtitle" id="class-info">Loading class data...</p>
            </div>

            <!-- Stats -->
            <div class="teacher-stats mb-2">
                <div class="stat-card">
                    <div class="stat-value" id="total-learners">0</div>
                    <div class="stat-label">Total Learners</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="struggling-count">0</div>
                    <div class="stat-label">Struggling</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avg-confidence">0%</div>
                    <div class="stat-label">Avg Confidence</div>
                </div>
            </div>

            <!-- Language Barriers Alert -->
            <div class="alert-bar mb-2" id="language-alert">
                <!-- Populated by JS -->
            </div>

            <!-- Learners List -->
            <div class="mb-2">
                <h2 style="font-size: 1.2rem; margin-bottom: 1rem;">Learner Progress</h2>
                <div id="learners-list">
                    <!-- Learner cards will be populated by JS -->
                </div>
            </div>

            <!-- Intervention Notes -->
            <div class="mt-3">
                <h2 style="font-size: 1.2rem; margin-bottom: 1rem;">Recommended Interventions</h2>
                <div class="card" style="padding: 1.5rem;">
                    <div id="interventions-list">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="../data/mock-data.js"></script>
    <script src="../js/teacher.js"></script>
    <script>
        function exitDemo() {
            if (confirm('Exit the demo and return to the homepage?')) {
                clearLearnerProfile();
                window.location.href = '../index.html';
            }
        }
    </script>
</body>
</html>
